      str, offset: int = 1, limit: int = _DEFAULT_LIMIT) -> str:\\n23|     p = Path(path).expanduser()\\n24|
      \    if not p.exists():\\n25|         return f\\\"Error: file not found: {p}\\\"\\n26|
      \    if not p.is_file():\\n27|         return f\\\"Error: not a file: {p}\\\"\\n28|
      \\n29|     all_lines = p.read_text(errors=\\\"replace\\\").splitlines()\\n30|
      \    total = len(all_lines)\\n31|     if total == 0:\\n32|         return f\\\"(empty
      file: {p})\\\"\\n33| \\n34|     offset = max(1, offset)\\n35|     if offset
      > total:\\n36|         return f\\\"Error: offset {offset} is beyond end of file
      ({total} lines)\\\"\\n37| \\n38|     start = offset - 1\\n39|     end = min(start
      + limit, total)\\n40|     numbered = [f\\\"{start + i + 1}| {line}\\\" for i,
      line in enumerate(all_lines[start:end])]\\n41|     result = \\\"\\\\n\\\".join(numbered)\\n42|
      \\n43|     # Trim if too large\\n44|     if len(result) > _MAX_CHARS:\\n45|
      \        trimmed, chars = [], 0\\n46|         for line in numbered:\\n47|             chars
